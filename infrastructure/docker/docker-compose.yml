services:
  postgres:
    image: postgres:15
    container_name: aidev-postgres
    environment:
      POSTGRES_DB: aidev
      POSTGRES_USER: aidev
      POSTGRES_PASSWORD: aidev123
    ports:
      - "5432:5432"
  mongodb:
    image: mongo:7
    container_name: aidev-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aidev
      MONGO_INITDB_ROOT_PASSWORD: aidev123
    ports:
      - "27017:27017"
  redis:
    image: redis:7-alpine
    container_name: aidev-redis
    ports:
      - "6379:6379"